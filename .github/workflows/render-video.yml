name: Render X Video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Render video
        run: npm run video:render

      - name: Upload MP4 artifact
        uses: actions/upload-artifact@v4
        with:
          name: x-explainer-mp4
          path: out/x-explainer.mp4
          if-no-files-found: error
